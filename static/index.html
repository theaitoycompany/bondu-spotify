<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bondu Jukebox</title>
<style>
  :root {
    --forest: #2F4F3F;
    --forest-mid: #6A9C80;
    --forest-light: #C8E4D0;
    --mint: #5EB8A1;
    --plum: #7B68AE;
    --coral: #F28882;
    --honey: #EDAA50;
    --vanilla: #FFF7EE;
    --n1: #23232C;
    --n2: #6B6B80;
    --n3: #9C9CB0;
    --n4: #E0E0EA;
    --n5: #F5F5F8;
    --green: #50B880;
    --red: #F06050;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--vanilla); color: var(--n1);
    font-family: "Gellix", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-feature-settings: "ss01", "cv11"; -webkit-font-smoothing: antialiased; }
  a { color: var(--forest); }

  .wrap { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; }
  header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--forest); }
  header .sub { font-size: 14px; color: var(--n2); }

  .now { display: grid; grid-template-columns: 120px 1fr; gap: 20px; padding: 20px;
    background: white; border: 1px solid var(--n4); border-radius: 20px; }
  .now .art { width: 120px; height: 120px; border-radius: 14px; background: var(--n5); overflow: hidden; }
  .now .art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .now .meta .title { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; color: var(--n1); margin: 0 0 4px; }
  .now .meta .artist { font-size: 16px; color: var(--n2); margin: 0 0 14px; }
  .progress { height: 6px; background: var(--n4); border-radius: 999px; overflow: hidden; margin-bottom: 14px; max-width: 420px; }
  .progress > div { height: 100%; background: var(--forest-mid); width: 0%; transition: width 1s linear; }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  button.ctrl { appearance: none; border: 1px solid var(--n4); background: white; color: var(--n1);
    height: 40px; padding: 0 14px; border-radius: 12px; font: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.12s ease; }
  button.ctrl:hover { background: var(--n5); border-color: var(--n3); }
  button.primary { background: var(--forest); border-color: var(--forest); color: white; }
  button.primary:hover { background: var(--forest-mid); border-color: var(--forest-mid); }
  button.pill { border-radius: 999px; padding: 0 16px; }
  button.ghost { background: transparent; border-color: transparent; }
  button.ghost:hover { background: var(--forest-light); }

  .vol { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .vol input[type=range] { accent-color: var(--forest); width: 120px; }
  .vol .val { font-size: 12px; color: var(--n2); width: 28px; text-align: right; }

  .search { margin-top: 32px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab { font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: 999px;
    color: var(--n2); cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
  .tab:hover { color: var(--n1); background: var(--n5); }
  .tab.active { background: var(--forest); color: white; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; height: 48px; border-radius: 14px; border: 1px solid var(--n4);
    padding: 0 16px; font: inherit; font-size: 16px; background: white; color: var(--n1); outline: none;
    transition: border-color 0.12s; }
  .search-row input:focus { border-color: var(--forest-mid); }
  .search-row input::placeholder { color: var(--n3); }

  .grid { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .card { background: white; border: 1px solid var(--n4); border-radius: 16px; padding: 12px;
    display: flex; flex-direction: column; gap: 10px; transition: all 0.12s; }
  .card:hover { border-color: var(--forest-mid); transform: translateY(-2px); }
  .card .art { width: 100%; aspect-ratio: 1; border-radius: 10px; background: var(--n5); overflow: hidden; }
  .card .art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .name { font-size: 14px; font-weight: 600; color: var(--n1); line-height: 1.3;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card .sub { font-size: 12px; color: var(--n2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .acts { display: flex; gap: 6px; margin-top: 2px; }
  .card .acts button { flex: 1; height: 32px; padding: 0 8px; font-size: 12px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--n1); color: white; padding: 10px 18px; border-radius: 999px;
    font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { color: var(--n3); font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Bondu Jukebox</h1>
    <span class="sub">office speaker control</span>
  </header>

  <section class="now" id="now">
    <div class="art"><img id="np-img" alt="" /></div>
    <div class="meta">
      <p class="title" id="np-title">Nothing playing</p>
      <p class="artist" id="np-artist">—</p>
      <div class="progress"><div id="np-bar"></div></div>
      <div class="controls">
        <button class="ctrl pill" id="btn-prev">⏮ Prev</button>
        <button class="ctrl pill primary" id="btn-play">▶ Play</button>
        <button class="ctrl pill" id="btn-skip">Skip ⏭</button>
        <button class="ctrl pill ghost" id="btn-shuf">🔀 Shuffle</button>
        <div class="vol">
          <span style="font-size:14px;color:var(--n2)">Vol</span>
          <input type="range" min="0" max="100" id="vol" />
          <span class="val" id="vol-val">—</span>
        </div>
      </div>
    </div>
  </section>

  <section class="search">
    <div class="tabs">
      <div class="tab active" data-kind="track">Tracks</div>
      <div class="tab" data-kind="album">Albums</div>
      <div class="tab" data-kind="playlist">Playlists</div>
      <div class="tab" data-kind="artist">Artists</div>
    </div>
    <div class="search-row">
      <input id="q" placeholder="Search Spotify…" autocomplete="off" />
      <button class="ctrl primary" id="btn-search">Search</button>
    </div>
    <div class="grid" id="results"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
  let kind = "track";
  const $ = (id) => document.getElementById(id);

  function toast(msg) {
    const el = $("toast"); el.textContent = msg; el.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove("show"), 1800);
  }

  async function j(url, opts = {}) {
    const r = await fetch(url, { headers: { "content-type": "application/json" }, ...opts });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function refreshNow() {
    try {
      const s = await j("/api/now");
      if (!s || !s.name) {
        $("np-title").textContent = "Nothing playing";
        $("np-artist").textContent = "—";
        $("np-img").src = ""; $("np-img").style.opacity = 0;
        $("np-bar").style.width = "0%";
        $("btn-play").textContent = "▶ Play";
        return;
      }
      $("np-title").textContent = s.name;
      $("np-artist").textContent = s.artist + "  ·  " + s.album;
      if (s.image) { $("np-img").src = s.image; $("np-img").style.opacity = 1; }
      const pct = s.duration_ms ? (s.progress_ms / s.duration_ms) * 100 : 0;
      $("np-bar").style.width = pct + "%";
      $("btn-play").textContent = s.is_playing ? "⏸ Pause" : "▶ Play";
      if (document.activeElement !== $("vol")) { $("vol").value = s.volume; $("vol-val").textContent = s.volume; }
    } catch (e) { /* keep last state */ }
  }

  async function search() {
    const q = $("q").value.trim(); if (!q) return;
    const r = await j("/api/search", { method: "POST", body: JSON.stringify({ q, kind }) });
    const grid = $("results"); grid.innerHTML = "";
    if (!r.items.length) { grid.innerHTML = '<div class="empty">No results</div>'; return; }
    for (const it of r.items) {
      const card = document.createElement("div"); card.className = "card";
      card.innerHTML = `
        <div class="art">${it.image ? `<img src="${it.image}"/>` : ""}</div>
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="sub">${escapeHtml(it.subtitle || "")}</div>
        <div class="acts">
          <button class="ctrl primary" data-act="play">Play</button>
          ${kind === "track" ? '<button class="ctrl" data-act="queue">Queue</button>' : ""}
        </div>`;
      card.querySelector('[data-act="play"]').onclick = async () => {
        await j("/api/play", { method: "POST", body: JSON.stringify({ uri: it.uri, kind }) });
        toast("Playing " + it.name); setTimeout(refreshNow, 500);
      };
      const qb = card.querySelector('[data-act="queue"]');
      if (qb) qb.onclick = async () => {
        await j("/api/queue", { method: "POST", body: JSON.stringify({ uri: it.uri }) });
        toast("Queued " + it.name);
      };
      grid.appendChild(card);
    }
  }

  function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active"); kind = t.dataset.kind;
    if ($("q").value.trim()) search();
  });
  $("btn-search").onclick = search;
  $("q").addEventListener("keydown", e => { if (e.key === "Enter") search(); });

  $("btn-play").onclick = async () => {
    const label = $("btn-play").textContent;
    const playing = label.startsWith("⏸");
    await j(playing ? "/api/pause" : "/api/resume", { method: "POST" });
    setTimeout(refreshNow, 300);
  };
  $("btn-skip").onclick = async () => { await j("/api/skip", { method: "POST" }); setTimeout(refreshNow, 400); };
  $("btn-prev").onclick = async () => { await j("/api/prev", { method: "POST" }); setTimeout(refreshNow, 400); };
  let shuf = false;
  $("btn-shuf").onclick = async () => {
    shuf = !shuf;
    await j("/api/shuffle", { method: "POST", body: JSON.stringify({ state: shuf }) });
    toast("Shuffle " + (shuf ? "on" : "off"));
  };
  let volT;
  $("vol").addEventListener("input", e => {
    $("vol-val").textContent = e.target.value;
    clearTimeout(volT);
    volT = setTimeout(() => j("/api/volume", { method: "POST", body: JSON.stringify({ volume: +e.target.value }) }), 200);
  });

  refreshNow(); setInterval(refreshNow, 3000);
</script>
</body>
</html>
